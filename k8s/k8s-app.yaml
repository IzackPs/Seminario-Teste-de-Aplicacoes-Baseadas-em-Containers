apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-seminario
  labels:
    app: api-seminario
    contexto: seminario-sre
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25% 
  replicas: 1
  selector:
    matchLabels:
      app: api-seminario
  template:
    metadata:
      labels:
        app: api-seminario
    spec:
      # Configurações de segurança em nível de Pod (aplica-se a todos os contêineres)
      securityContext:
        runAsNonRoot: true # Impede a execução como usuário root (boas práticas de segurança)
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault # Utiliza o perfil padrão do runtime para bloquear syscalls perigosas

      containers:
      - name: api
        image: api-seminario:v2
        imagePullPolicy: Never
        env:
        - name: HOME
          value: "/tmp"
        ports:
        - containerPort: 8080

        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "rm -f /tmp/api_crashed.flag"]

        securityContext:
          readOnlyRootFilesystem: true  # Torna o sistema de arquivos raiz imutável para evitar adulterações
          allowPrivilegeEscalation: false # Previne que processos filhos escalem privilégios (ex: via setuid)
          capabilities:
            drop: ["ALL"] # Aplica o Princípio do Menor Privilégio removendo todas as capabilities do Kernel do Linux

        # Readiness Probe: O Pod está pronto para receber tráfego?
        # Em caso de 3 falhas consecutivas (6s totais), o Pod é removido do Service/LoadBalancer.
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 2
          failureThreshold: 3

        # Liveness Probe: A aplicação está travada ou em deadlock?
        # Em caso de 5 falhas consecutivas (25s totais), o Kubelet reiniciará o contêiner (Self-Healing).
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5

        resources:
          requests:
            cpu: "30m"      # minimo cpu
          limits:
            cpu: "60m"      # limite cpu
          # Limites de memória foram omitidos intencionalmente para teste de carga pesada do K6

        # Mapeamento do volume temporário para dentro do contêiner
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume

      # Declaração dos volumes utilizados pelos contêineres do Pod
      volumes:
      - name: tmp-volume
        emptyDir: {} # Volume efêmero criado no disco do nó (os dados são perdidos se o Pod for destruído)
---
apiVersion: v1
kind: Service
metadata:
  name: api-seminario-svc
spec:
  type: NodePort
  selector:
    app: api-seminario
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
# Configuração do Horizontal Pod Autoscaler (HPA) para elasticidade
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-seminario-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-seminario
  minReplicas: 1
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # Adiciona réplicas quando a média de uso de CPU ultrapassar 70%