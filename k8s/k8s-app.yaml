apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-seminario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-seminario
  template:
    metadata:
      labels:
        app: api-seminario
    spec:
      containers:
      - name: api
        image: api-seminario:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        # TESTE DE CRASH (RESILIENCIA)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: "30m"
          # memory: "64Mi" Boa pratica de limitação de memoria, mas para melhor visualização a limitação esta sendo somente CPU
          limits:
            cpu: "60m"
          # memory: "128Mi" Boa pratica de limitação de memoria, mas para melhor visualização a limitação esta sendo somente CPU
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 2
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-seminario-svc
spec:
  type: NodePort
  selector:
    app: api-seminario
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
# TESTE DE CARGA (ESCALABILIDADE)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-seminario-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-seminario
  minReplicas: 1
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
